AWSTemplateFormatVersion: "2010-09-09"
Description: Pull-request preview pipeline for the jy-aigc Go API and Cloudflare Pages.

Parameters:
  ProjectName:
    Type: String
    Default: jy-aigc
    AllowedPattern: "[a-z0-9-]+"
  GitHubRepositoryUrl:
    Type: String
    Default: https://github.com/Jade-ops-tech/jy-aigc.git
  GitHubConnectionArn:
    Type: String
    MinLength: 1
    Description: An AVAILABLE AWS CodeConnections GitHub App connection ARN.
  PullRequestActorAccountId:
    Type: String
    AllowedPattern: "[0-9]+"
    Description: Numeric GitHub account ID allowed to trigger privileged PR builds.
  BaseBranch:
    Type: String
    Default: main
    AllowedPattern: "[A-Za-z0-9._/-]+"
  EcrRepositoryName:
    Type: String
    Default: jy-aigc/go-api
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Two public subnets in different Availability Zones for each preview ALB.
  TaskSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets used by the preview Fargate task and Cloud Map Lambda.
  AssignPublicIp:
    Type: String
    Default: ENABLED
    AllowedValues: [ENABLED, DISABLED]
  DatabaseUrlSecretArn:
    Type: String
    MinLength: 1
  DatabaseCidr:
    Type: String
    Default: 0.0.0.0/0
  CloudflareAccountId:
    Type: String
    MinLength: 1
  CloudflarePagesProject:
    Type: String
    Default: jy-aigc
    AllowedPattern: "[a-z0-9-]+"
  CloudflareApiTokenSecretArn:
    Type: String
    MinLength: 1
    Description: Secrets Manager ARN containing a plain Cloudflare Pages API token.
  WebServerUrl:
    Type: String
    MinLength: 1
    Description: Existing Node API origin used by non-Go pages in the preview frontend.

Resources:
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-pr-codebuild-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: build-and-publish-preview
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: BuildLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-go-pr-preview*"
              - Sid: GitHubConnection
                Effect: Allow
                Action:
                  - codeconnections:GetConnection
                  - codeconnections:GetConnectionToken
                  - codeconnections:UseConnection
                Resource: !Ref GitHubConnectionArn
              - Sid: EcrLogin
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: EcrPush
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:DescribeImages
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: !Sub "arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/${EcrRepositoryName}"
              - Sid: ReadCloudflareToken
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref CloudflareApiTokenSecretArn
              - Sid: AssumePreviewDeployRole
                Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-pr-deploy-role"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Purpose
          Value: pr-preview

  PrDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-pr-deploy-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole
            Condition:
              ArnEquals:
                aws:PrincipalArn: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-pr-codebuild-role"
      Policies:
        - PolicyName: manage-pr-cloudformation-stacks
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: PreviewStacks
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStackResources
                  - cloudformation:UpdateStack
                Resource: !Sub "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${ProjectName}-go-pr-*/*"
              - Sid: PassCloudFormationExecutionRole
                Effect: Allow
                Action: iam:PassRole
                Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-pr-cfn-execution-role"
                Condition:
                  StringEquals:
                    iam:PassedToService: cloudformation.amazonaws.com
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Purpose
          Value: pr-preview

  PrCloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-pr-cfn-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: provision-go-preview-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: RuntimeServices
                Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:CreateSecurityGroup
                  - ec2:CreateTags
                  - ec2:DeleteSecurityGroup
                  - ec2:DeleteTags
                  - ec2:Describe*
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ecs:*
                  - elasticloadbalancing:*
                  - lambda:*
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:ListTagsForResource
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                  - servicediscovery:*
                Resource: "*"
              - Sid: ManagePreviewRuntimeRoles
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-go-pr-*"
              - Sid: CreateEcsServiceLinkedRole
                Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-service-role/ecs.amazonaws.com/AWSServiceRoleForECS*"
                Condition:
                  StringEquals:
                    iam:AWSServiceName: ecs.amazonaws.com
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Purpose
          Value: pr-preview

  PreviewBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${ProjectName}-go-pr-preview"
      Description: Build a Go image and create or remove an isolated environment for each trusted PR.
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_DOCKER_LAYER_CACHE
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux-aarch64-standard:3.0
        ImagePullCredentialsType: CODEBUILD
        PrivilegedMode: true
        Type: ARM_CONTAINER
        EnvironmentVariables:
          - Name: PROJECT_NAME
            Type: PLAINTEXT
            Value: !Ref ProjectName
          - Name: ECR_REPOSITORY_URI
            Type: PLAINTEXT
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.${AWS::URLSuffix}/${EcrRepositoryName}"
          - Name: PR_DEPLOY_ROLE_ARN
            Type: PLAINTEXT
            Value: !GetAtt PrDeployRole.Arn
          - Name: PR_CLOUDFORMATION_ROLE_ARN
            Type: PLAINTEXT
            Value: !GetAtt PrCloudFormationExecutionRole.Arn
          - Name: VPC_ID
            Type: PLAINTEXT
            Value: !Ref VpcId
          - Name: PUBLIC_SUBNET_IDS
            Type: PLAINTEXT
            Value: !Join [",", !Ref PublicSubnetIds]
          - Name: TASK_SUBNET_IDS
            Type: PLAINTEXT
            Value: !Join [",", !Ref TaskSubnetIds]
          - Name: ASSIGN_PUBLIC_IP
            Type: PLAINTEXT
            Value: !Ref AssignPublicIp
          - Name: DATABASE_URL_SECRET_ARN
            Type: PLAINTEXT
            Value: !Ref DatabaseUrlSecretArn
          - Name: DATABASE_CIDR
            Type: PLAINTEXT
            Value: !Ref DatabaseCidr
          - Name: CLOUDFLARE_ACCOUNT_ID
            Type: PLAINTEXT
            Value: !Ref CloudflareAccountId
          - Name: CLOUDFLARE_PAGES_PROJECT
            Type: PLAINTEXT
            Value: !Ref CloudflarePagesProject
          - Name: CLOUDFLARE_API_TOKEN
            Type: SECRETS_MANAGER
            Value: !Ref CloudflareApiTokenSecretArn
          - Name: WEB_SERVER_URL
            Type: PLAINTEXT
            Value: !Ref WebServerUrl
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
      Source:
        Auth:
          Resource: !Ref GitHubConnectionArn
          Type: CODECONNECTIONS
        BuildSpec: buildspec-pr.yml
        GitCloneDepth: 1
        Location: !Ref GitHubRepositoryUrl
        ReportBuildStatus: true
        Type: GITHUB
      TimeoutInMinutes: 60
      Triggers:
        Webhook: true
        FilterGroups:
          - - Type: EVENT
              Pattern: PULL_REQUEST_CREATED,PULL_REQUEST_UPDATED,PULL_REQUEST_REOPENED,PULL_REQUEST_MERGED,PULL_REQUEST_CLOSED
            - Type: BASE_REF
              Pattern: !Sub "^refs/heads/${BaseBranch}$"
            - Type: ACTOR_ACCOUNT_ID
              Pattern: !Ref PullRequestActorAccountId
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Purpose
          Value: pr-preview

Outputs:
  BuildProjectName:
    Value: !Ref PreviewBuildProject
  CodeBuildRoleArn:
    Description: Role 1 - build, ECR push and Cloudflare upload.
    Value: !GetAtt CodeBuildServiceRole.Arn
  PrDeployRoleArn:
    Description: Role 2 - PR stack lifecycle control.
    Value: !GetAtt PrDeployRole.Arn
  CloudFormationExecutionRoleArn:
    Description: Role 3 - provision the Go preview runtime.
    Value: !GetAtt PrCloudFormationExecutionRole.Arn
