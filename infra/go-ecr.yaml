AWSTemplateFormatVersion: "2010-09-09"
Description: Immutable ECR repository for the jy-aigc Go API.

Parameters:
  ProjectName:
    Type: String
    Default: jy-aigc
    AllowedPattern: "[a-z0-9-]+"
  RepositorySuffix:
    Type: String
    Default: go-api
    AllowedPattern: "[a-z0-9._/-]+"

Resources:
  GoApiRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      EmptyOnDelete: false
      EncryptionConfiguration:
        EncryptionType: AES256
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: IMMUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Delete untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Keep the newest 30 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              }
            ]
          }
      RepositoryName: !Sub "${ProjectName}/${RepositorySuffix}"
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  RepositoryArn:
    Value: !GetAtt GoApiRepository.Arn
  RepositoryName:
    Value: !Ref GoApiRepository
  RepositoryUri:
    Value: !GetAtt GoApiRepository.RepositoryUri
